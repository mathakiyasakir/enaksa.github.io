<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | e-Naksha</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --orange: #eb6923; --blue: #4b7dbd; --grey: #5c5c5c; --bg: #f4f6f9; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); overflow: hidden; }
    #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s; }
    .intro-house-svg { width: 100px; height: auto; margin-bottom: 15px; }
    .layer-blue { opacity: 0; transform: translateY(-20px); animation: dropIn 0.6s forwards 0.3s; }
    .layer-orange { opacity: 0; transform: translateY(-20px); animation: dropIn 0.6s forwards 0.8s; }
    .intro-text { font-family: 'Montserrat', sans-serif; font-size: 3rem; font-weight: 700; }
    .intro-e { color: var(--orange); opacity: 0; animation: fadeIn 0.5s forwards 1.3s; }
    .intro-naksha { color: var(--blue); opacity: 0; animation: fadeIn 0.5s forwards 1.7s; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }
    .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s ease; }
    .auth-container.show { opacity: 1; }
    .auth-box { background: #ffffff; width: 90%; max-width: 400px; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border-bottom: 5px solid var(--blue); }
    h2 { color: var(--grey); margin-bottom: 25px; font-weight: 600; }
    .input-group { position: relative; margin-bottom: 20px; }
    .input-group i { position: absolute; left: 15px; top: 15px; color: #aaa; }
    input { width: 100%; padding: 14px 15px 14px 45px; border: 1px solid #ddd; border-radius: 10px; outline: none; background: #f9f9f9; font-family: 'Poppins'; }
    .btn { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.3s; text-transform: uppercase; }
    .btn-main { background: var(--blue); color: white; }
    .btn-toggle { background: transparent; color: var(--orange); border: 2px solid var(--orange); margin-top: 15px; }
  </style>
</head>
<body>
  <div id="splash-screen">
    <svg class="intro-house-svg" viewBox="0 0 120 100"><path class="layer-orange" d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" /><path class="layer-blue" d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" /></svg>
    <div class="intro-text"><span class="intro-e">e</span><span style="color:#5c5c5c">-</span><span class="intro-naksha">Naksha</span></div>
  </div>

  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <h2 id="formTitle">Login</h2>
      <div class="input-group" id="nameField" style="display:none;"><i class="fa-solid fa-user"></i><input type="text" id="userName" placeholder="Full Name"></div>
      <div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="email" placeholder="Email Address"></div>
      <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
      <button class="btn btn-main" id="actionBtn">Sign In</button>
      <button class="btn btn-toggle" id="toggleBtn">Create New Account</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.onload = () => { setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; document.getElementById('authContainer').classList.add('show'); }, 3000); };

    let isLogin = true;
    const toggleBtn = document.getElementById('toggleBtn');
    const nameField = document.getElementById('nameField');
    const actionBtn = document.getElementById('actionBtn');

    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('formTitle').innerText = isLogin ? "Login" : "Register";
      nameField.style.display = isLogin ? "none" : "block";
      actionBtn.innerText = isLogin ? "Sign In" : "Sign Up";
      toggleBtn.innerText = isLogin ? "Create New Account" : "Back to Login";
    });

    actionBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if(isLogin) {
        signInWithEmailAndPassword(auth, email, password).then(() => window.location.href = "index.html").catch(err => alert(err.message));
      } else {
        const fullName = document.getElementById('userName').value;
        createUserWithEmailAndPassword(auth, email, password).then((res) => {
          updateProfile(res.user, { displayName: fullName }).then(() => window.location.href = "index.html");
        }).catch(err => alert(err.message));
      }
    });
  </script>
</body>
</html>
