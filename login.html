<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | e-Naksha</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --orange: #eb6923; --blue: #4b7dbd; }
    body { font-family: 'Poppins', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .auth-card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    .error-alert { display: none; background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fecaca; font-size: 0.85rem; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--blue); color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .toggle-text { margin-top: 15px; font-size: 0.85rem; color: #555; }
    .toggle-text span { color: var(--orange); cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2 id="form-title" style="font-family: Montserrat; margin-bottom: 20px;">Login</h2>
    
    <div id="error-alert" class="error-alert"></div>

    <input type="text" id="reg-name" placeholder="Full Name" style="display: none;">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    
    <button class="btn" id="action-btn">Sign In</button>
    
    <p id="forgot-btn" style="color: var(--blue); font-size: 0.8rem; cursor: pointer; margin-top: 10px;">Forgot Password?</p>
    
    <p class="toggle-text">Don't have an account? <span id="toggle-link">Register</span></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;
    const alertBox = document.getElementById('error-alert');

    const showAlert = (msg) => {
      alertBox.innerText = msg;
      alertBox.style.display = 'block';
      setTimeout(() => alertBox.style.display = 'none', 4000);
    };

    document.getElementById('toggle-link').onclick = () => {
      isLogin = !isLogin;
      document.getElementById('form-title').innerText = isLogin ? "Login" : "Register";
      document.getElementById('reg-name').style.display = isLogin ? "none" : "block";
      document.getElementById('action-btn').innerText = isLogin ? "Sign In" : "Sign Up";
      document.getElementById('toggle-link').innerText = isLogin ? "Register" : "Login";
    };

    document.getElementById('action-btn').onclick = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if(isLogin) {
        signInWithEmailAndPassword(auth, email, password)
          .then(() => window.location.href = "index.html")
          .catch(() => showAlert("Invalid Email or Password!"));
      } else {
        const name = document.getElementById('reg-name').value;
        createUserWithEmailAndPassword(auth, email, password)
          .then((res) => updateProfile(res.user, { displayName: name }).then(() => window.location.href = "index.html"))
          .catch(err => showAlert(err.message));
      }
    };

    document.getElementById('forgot-btn').onclick = () => {
      const email = document.getElementById('email').value;
      if(!email) return showAlert("Enter email first!");
      sendPasswordResetEmail(auth, email).then(() => alert("Reset link sent!"));
    };
  </script>
</body>
</html>
