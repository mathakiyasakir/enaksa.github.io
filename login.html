<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | e-Naksha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #4b7dbd, #eb6923); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .login-card { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    button { width: 100%; padding: 12px; background: #eb6923; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
    button:hover { background: #d1561a; }
    .toggle-link { margin-top: 15px; font-size: 0.85rem; color: #5c5c5c; cursor: pointer; }
    #message { color: red; font-size: 0.8rem; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="login-card">
    <h2 id="formTitle" style="color: #4b7dbd; margin-bottom: 20px;">Login</h2>
    <div id="nameField" style="display: none;">
      <input type="text" id="userName" placeholder="Full Name">
    </div>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button id="actionBtn">Sign In</button>
    <div id="message"></div>
    <div class="toggle-link" id="toggleBtn">New to e-Naksha? Create Account</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;

    document.getElementById('toggleBtn').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('formTitle').innerText = isLogin ? "Login" : "Register";
      document.getElementById('nameField').style.display = isLogin ? "none" : "block";
      document.getElementById('actionBtn').innerText = isLogin ? "Sign In" : "Sign Up";
      document.getElementById('toggleBtn').innerText = isLogin ? "New to e-Naksha? Create Account" : "Already have an account? Login";
    });

    document.getElementById('actionBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msgDiv = document.getElementById('message');

      if(isLogin) {
        signInWithEmailAndPassword(auth, email, password)
          .then(() => window.location.href = "index.html")
          .catch(err => msgDiv.innerText = err.message);
      } else {
        const name = document.getElementById('userName').value;
        createUserWithEmailAndPassword(auth, email, password)
          .then((res) => {
            updateProfile(res.user, { displayName: name }).then(() => window.location.href = "index.html");
          })
          .catch(err => msgDiv.innerText = err.message);
      }
    });
  </script>
</body>
</html>
