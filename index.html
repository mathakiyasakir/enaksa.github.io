<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Naksha | Sketch Your Dream</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; overflow-x: hidden; padding-bottom: 80px; }

    /* SPLASH SCREEN */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-color: #ffffff; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
      transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
    }
    .intro-container { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .intro-house-svg { width: 120px; height: auto; margin-bottom: 15px; }
    .intro-layer-blue { opacity: 0; transform: translateY(-25px); animation: dropIn 0.6s forwards 0.3s; }
    .intro-layer-orange { opacity: 0; transform: translateY(-25px); animation: dropIn 0.6s forwards 0.8s; }
    .intro-text { display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 700; line-height: 1; }
    .intro-e { color: #eb6923; opacity: 0; animation: fadeIn 0.5s forwards 1.3s; }
    .intro-dash { color: #5c5c5c; opacity: 0; margin: 0 5px; animation: fadeIn 0.5s forwards 1.6s; }
    .intro-naksha { color: #4b7dbd; opacity: 0; animation: slideRight 0.5s forwards 1.9s; }
    .intro-slogan { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: #5c5c5c; margin-top: 10px; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards 2.5s; letter-spacing: 1px; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 75px;
      background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: none; justify-content: space-between; align-items: center;
      padding: 0 5%; z-index: 1000;
    }
    .header-logo-text { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 700; }

    .side-menu {
      position: fixed; top: 0; right: -280px; width: 280px; height: 100vh;
      background: #ffffff; z-index: 2000; transition: 0.4s; padding: 30px 20px;
      box-shadow: -5px 0 15px rgba(0,0,0,0.1);
    }
    .side-menu.active { right: 0; }
    .menu-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background: rgba(0,0,0,0.5); z-index: 1500; display: none;
    }
    .menu-overlay.active { display: block; }

    .auth-container {
      background: #ffffff; padding: 30px; border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 20px;
      text-align: center;
    }
    .auth-title { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 25px; }
    .input-group { position: relative; margin-bottom: 15px; text-align: left; }
    .input-group label { font-size: 0.8rem; font-weight: 600; color: #5c5c5c; margin-bottom: 5px; display: block; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #4b7dbd; }
    .input-wrapper input, .input-wrapper select {
      width: 100%; padding: 12px 12px 12px 45px; border-radius: 10px;
      border: 1.5px solid #eee; font-family: 'Poppins', sans-serif; outline: none;
    }
    .auth-btn {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: #eb6923; color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .auth-btn:hover { background: #d45a1e; }

    .content-section { padding: 95px 20px 20px; display: none; }
    .active-section { display: block; }
    .service-card {
      background: #ffffff; padding: 30px; border-radius: 20px; text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-bottom: 5px solid #eb6923;
      margin-bottom: 20px; cursor: pointer;
    }
    .service-card i { font-size: 3rem; color: #4b7dbd; margin-bottom: 15px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
      background: #ffffff; display: flex; justify-content: space-around;
      align-items: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #5c5c5c; font-size: 0.75rem; cursor: pointer; }
    .nav-item.active { color: #eb6923; font-weight: 600; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="intro-container">
      <svg class="intro-house-svg" viewBox="0 0 120 100">
        <path class="intro-layer-orange" d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" />
        <path class="intro-layer-blue" d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" />
      </svg>
      <div class="intro-text"><span class="intro-e">e</span><span class="intro-dash">-</span><span class="intro-naksha">Naksha</span></div>
      <div class="intro-slogan">Sketch Your Dream</div>
    </div>
  </div>

  <header id="main-header">
    <div class="header-logo-text"><span style="color: #eb6923;">e</span><span style="color: #5c5c5c;">-</span><span style="color: #4b7dbd;">Naksha</span></div>
    <div onclick="toggleMenu()" style="cursor:pointer;"><i class="fa-solid fa-bars-staggered" style="font-size: 1.6rem; color: #5c5c5c;"></i></div>
  </header>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  <div class="side-menu" id="sideMenu">
    <div onclick="toggleMenu()" style="text-align:right; cursor:pointer;"><i class="fa-solid fa-xmark fa-2xl"></i></div>
    <ul style="list-style:none; margin-top:30px;">
        <li style="padding:15px 0; border-bottom:1px solid #eee;" onclick="switchTab(null, 'home'); toggleMenu()">Home</li>
        <li style="padding:15px 0; border-bottom:1px solid #eee;" onclick="switchTab(null, 'service'); toggleMenu()">Services</li>
    </ul>
  </div>

  <div id="home" class="content-section active-section">
    <h3>Latest Works</h3>
    </div>

  <div id="service" class="content-section">
    <div id="service-selection">
        <div class="service-card" onclick="openServiceForm('2d')">
            <i class="fa-solid fa-ruler-combined"></i>
            <h3>2D Layout Plan</h3>
        </div>
        <div class="service-card" onclick="openServiceForm('3d')">
            <i class="fa-solid fa-cube"></i>
            <h3>3D Elevation</h3>
        </div>
    </div>
    
    <div id="form-container"></div>
  </div>

  <div id="profile" class="content-section">
    <div id="auth-view"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab(this, 'home')"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="switchTab(this, 'service')"><i class="fa-solid fa-screwdriver-wrench"></i><span>Service</span></div>
    <div class="nav-item" onclick="switchTab(this, 'profile')"><i class="fa-solid fa-user"></i><span>Profile</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      storageBucket: "enkasha-99c34.firebasestorage.app",
      messagingSenderId: "759836461630",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let user = null;

    onAuthStateChanged(auth, (u) => { user = u; });

    window.openServiceForm = (type) => {
        if(!user) return switchTab(document.querySelectorAll('.nav-item')[2], 'profile');
        
        const container = document.getElementById('form-container');
        document.getElementById('service-selection').style.display = 'none';
        
        const file = type === '2d' ? 'form2d.html' : 'form3d.html';
        fetch(file).then(res => res.text()).then(html => {
            container.innerHTML = html;
            // Re-run script from fetched HTML
            const script = container.querySelector('script');
            if(script) eval(script.innerText);
        });
    };

    window.switchTab = (el, id) => {
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
      document.getElementById(id).classList.add('active-section');
      if(el) {
          document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
          el.classList.add('active');
      }
      document.getElementById('service-selection').style.display = 'block';
      document.getElementById('form-container').innerHTML = '';
    };

    window.onload = () => {
      setTimeout(() => {
        document.getElementById('splash-screen').style.transform = 'translateY(-100vh)';
        setTimeout(() => { 
          document.getElementById('splash-screen').style.display = 'none';
          document.getElementById('main-header').style.display = 'flex';
        }, 800);
      }, 4200);
    };
  </script>
</body>
</html>
