<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Naksha | Sketch Your Dream</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; overflow-x: hidden; }
    
    header { position: fixed; top: 0; left: 0; width: 100%; height: 75px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; }
    .header-left { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .header-logo-text { font-family: 'Montserrat'; font-size: 1.4rem; font-weight: 700; }
    
    .header-right { display: flex; align-items: center; gap: 15px; }
    #user-greeting { font-size: 0.9rem; font-weight: 600; color: #4b7dbd; }
    
    /* Profile Dropdown */
    .user-menu-wrapper { position: relative; }
    .login-icon-header { font-size: 1.6rem; color: #4b7dbd; cursor: pointer; }
    .user-dropdown { position: absolute; top: 40px; right: 0; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px; width: 160px; display: none; overflow: hidden; }
    .user-dropdown.show { display: block; }
    .user-dropdown a { display: block; padding: 12px; color: #333; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #eee; }
    .user-dropdown a:hover { background: #f4f6f9; color: #eb6923; }

    /* Side Menu */
    .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100vh; background: #fff; z-index: 2000; transition: 0.4s; padding: 30px 20px; }
    .side-menu.active { right: 0; }
    .menu-links { list-style: none; margin-top: 20px; }
    .menu-links li { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .menu-links a { text-decoration: none; color: #333; font-weight: 500; display: flex; align-items: center; gap: 15px; }
    .menu-links i { color: #eb6923; }

    #main-content { padding-top: 100px; text-align: center; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="header-left">
      <div class="header-logo-text"><span style="color:#eb6923">e</span>-Naksha</div>
    </a>
    <div class="header-right">
      <span id="user-greeting"></span>
      <div class="user-menu-wrapper">
        <div id="auth-btn-header" class="login-icon-header"><i class="fa-solid fa-circle-user"></i></div>
        <div class="user-dropdown" id="userDropdown">
            <a href="#"><i class="fa-solid fa-clock-history"></i> Order History</a>
            <a href="#" id="logoutLink" style="color:red;"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>
      </div>
      <div onclick="document.getElementById('sideMenu').classList.add('active')" style="cursor:pointer; font-size:1.5rem;"><i class="fa-solid fa-bars-staggered"></i></div>
    </div>
  </header>

  <div class="side-menu" id="sideMenu">
    <div onclick="document.getElementById('sideMenu').classList.remove('active')" style="cursor:pointer; text-align:right; font-size:1.5rem;"><i class="fa-solid fa-xmark"></i></div>
    <ul class="menu-links">
      <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="#"><i class="fa-solid fa-box-open"></i> My Orders</a></li>
      <li><a href="#"><i class="fa-solid fa-phone"></i> Contact Us</a></li>
    </ul>
  </div>

  <main id="main-content">
    <h1>Welcome to e-Naksha</h1>
    <p>Sketch Your Dream Home with Us.</p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      const greeting = document.getElementById('user-greeting');
      const dropdown = document.getElementById('userDropdown');
      const authBtn = document.getElementById('auth-btn-header');

      if (user) {
        greeting.innerText = "Hi, " + (user.displayName || "User");
        authBtn.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); };
      } else {
        greeting.innerText = "";
        authBtn.onclick = () => window.location.href = "login.html";
      }
    });

    document.getElementById('logoutLink').onclick = () => signOut(auth).then(() => window.location.reload());
    window.onclick = () => document.getElementById('userDropdown').classList.remove('show');
  </script>
</body>
</html>
