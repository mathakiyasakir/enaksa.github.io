<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | e-Naksha</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* 1. Base Settings & Colors */
    :root {
      --orange: #eb6923;
      --blue: #4b7dbd;
      --grey: #5c5c5c;
      --bg: #f4f6f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); overflow: hidden; }

    /* 2. Splash Screen Intro (Same as your website) */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-color: #ffffff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999;
      transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
    }

    .intro-house-svg { width: 100px; height: auto; margin-bottom: 15px; }
    .layer-blue { opacity: 0; transform: translateY(-20px); animation: dropIn 0.6s forwards 0.3s; }
    .layer-orange { opacity: 0; transform: translateY(-20px); animation: dropIn 0.6s forwards 0.8s; }

    .intro-text { font-family: 'Montserrat', sans-serif; font-size: 3rem; font-weight: 700; }
    .intro-e { color: var(--orange); opacity: 0; animation: fadeIn 0.5s forwards 1.3s; }
    .intro-naksha { color: var(--blue); opacity: 0; animation: fadeIn 0.5s forwards 1.7s; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }

    /* 3. Login Page Layout */
    .auth-container {
      height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      opacity: 0; transition: opacity 1s ease 0.5s;
    }
    .auth-container.show { opacity: 1; }

    /* Stylish House Logo for Login Box */
    .login-logo { margin-bottom: 30px; text-align: center; }
    .logo-text { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 700; margin-top: -10px; }

    /* 4. Stylish Auth Box */
    .auth-box {
      background: #ffffff;
      width: 90%; max-width: 400px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      text-align: center;
      border-bottom: 5px solid var(--blue);
    }

    h2 { color: var(--grey); margin-bottom: 25px; font-weight: 600; }

    .input-group { position: relative; margin-bottom: 20px; }
    .input-group i { position: absolute; left: 15px; top: 15px; color: #aaa; }
    
    input {
      width: 100%; padding: 14px 15px 14px 45px;
      border: 1px solid #ddd; border-radius: 10px;
      outline: none; font-family: 'Poppins', sans-serif;
      transition: 0.3s; background: #f9f9f9;
    }
    input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 8px rgba(75, 125, 189, 0.2); }

    /* 5. Professional Buttons */
    .btn {
      width: 100%; padding: 14px; margin-top: 10px;
      border: none; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 1rem; transition: 0.3s;
    }
    .btn-main { background: var(--blue); color: white; }
    .btn-main:hover { background: #3a6399; transform: translateY(-2px); }

    .btn-toggle { background: transparent; color: var(--orange); border: 2px solid var(--orange); margin-top: 15px; }
    .btn-toggle:hover { background: var(--orange); color: white; }

    .forgot-link { display: block; margin-top: 20px; color: var(--grey); text-decoration: none; font-size: 0.9rem; }
    .forgot-link:hover { color: var(--blue); text-decoration: underline; }

  </style>
</head>
<body>

  <div id="splash-screen">
    <svg class="intro-house-svg" viewBox="0 0 120 100">
      <path class="layer-orange" d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" />
      <path class="layer-blue" d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" />
    </svg>
    <div class="intro-text">
      <span class="intro-e">e</span><span style="color:#5c5c5c">-</span><span class="intro-naksha">Naksha</span>
    </div>
  </div>

  <div class="auth-container" id="authContainer">
    
    <div class="login-logo">
      <svg width="60" viewBox="0 0 120 100">
        <path d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" />
        <path d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" />
      </svg>
      <div class="logo-text">
        <span style="color:#eb6923">e</span><span style="color:#5c5c5c">-</span><span style="color:#4b7dbd">Naksha</span>
      </div>
    </div>

    <div class="auth-box">
      <h2 id="formTitle">Welcome Back</h2>
      
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address">
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
      </div>
      
      <button class="btn btn-main" id="actionBtn">Log In</button>
      <button class="btn btn-toggle" id="toggleBtn">Naya Account Banayein</button>

      <a href="#" class="forgot-link" id="forgotPass">Forgot Password?</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARmOCO4APamzc8wuUlp5rEgPH8hZUMX6U",
      authDomain: "enkasha-99c34.firebaseapp.com",
      projectId: "enkasha-99c34",
      storageBucket: "enkasha-99c34.firebasestorage.app",
      messagingSenderId: "759836461630",
      appId: "1:759836461630:web:30cc76c2c1075a3df99f6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Intro Animation Logic
    window.onload = () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        const container = document.getElementById('authContainer');
        splash.style.opacity = '0';
        splash.style.transform = 'scale(1.1)';
        setTimeout(() => {
          splash.style.display = 'none';
          container.classList.add('show');
        }, 1000);
      }, 3500); // 3.5 sec intro
    };

    let isLogin = true;
    const actionBtn = document.getElementById('actionBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const formTitle = document.getElementById('formTitle');

    // Login/Signup Toggle
    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      formTitle.innerText = isLogin ? "Welcome Back" : "Create Account";
      actionBtn.innerText = isLogin ? "Log In" : "Sign Up";
      toggleBtn.innerText = isLogin ? "Naya Account Banayein" : "Already have an account? Login";
    });

    // Auth Actions
    actionBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if(isLogin) {
        signInWithEmailAndPassword(auth, email, password)
          .then(() => alert("Login Success!"))
          .catch(err => alert(err.message));
      } else {
        createUserWithEmailAndPassword(auth, email, password)
          .then(() => alert("Account Ban Gaya!"))
          .catch(err => alert(err.message));
      }
    });

    // Reset Password
    document.getElementById('forgotPass').addEventListener('click', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if(!email) return alert("Pehle email likhiye.");
      sendPasswordResetEmail(auth, email)
        .then(() => alert("Reset link bhej di gayi hai!"))
        .catch(err => alert(err.message));
    });
  </script>
</body>
</html>
