<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Naksha | Sketch Your Dream</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Reset & Base Settings */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; overflow-x: hidden; }

    /* =========================================
       1. SPLASH SCREEN INTRO
       ========================================= */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-color: #ffffff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999;
      transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s;
    }

    .intro-container { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .intro-house-svg { width: 120px; height: auto; margin-bottom: 15px; }
    .intro-layer-blue { opacity: 0; transform: translateY(-25px); animation: dropIn 0.6s forwards 0.3s; }
    .intro-layer-orange { opacity: 0; transform: translateY(-25px); animation: dropIn 0.6s forwards 0.8s; }

    .intro-text { display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 700; line-height: 1; }
    .intro-e { color: #eb6923; opacity: 0; animation: fadeIn 0.5s forwards 1.3s; }
    .intro-dash { color: #5c5c5c; opacity: 0; margin: 0 5px; animation: fadeIn 0.5s forwards 1.6s; }
    .intro-naksha { color: #4b7dbd; opacity: 0; animation: slideRight 0.5s forwards 1.9s; }
    
    .intro-slogan { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: #5c5c5c; margin-top: 10px; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards 2.5s; letter-spacing: 1px; }

    @media (max-width: 600px) {
      .intro-text { font-size: 2.8rem; }
      .intro-house-svg { width: 90px; margin-bottom: 10px; }
      .intro-slogan { font-size: 1rem; }
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes dropIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* =========================================
       2. HEADER & SIDE MENU
       ========================================= */
    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 75px;
      background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; z-index: 1000;
      opacity: 0; transform: translateY(-100%);
      transition: all 0.8s ease;
    }
    header.show-header { opacity: 1; transform: translateY(0); }

    .header-left { display: flex; align-items: center; gap: 10px; text-decoration: none;}
    .header-logo-svg { width: 35px; height: auto; }
    .header-text-container { display: flex; flex-direction: column; line-height: 1.1; }
    .header-logo-text { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 700; display: flex; align-items: center;}
    .header-slogan { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; color: #5c5c5c; font-weight: 600; letter-spacing: 0.5px;}
    
    /* Header Right Section */
    .header-right { display: flex; align-items: center; gap: 15px; }
    .login-icon-header { font-size: 1.6rem; color: #4b7dbd; transition: 0.3s; text-decoration: none; }
    .login-icon-header:hover { color: #eb6923; transform: scale(1.1); }
    .menu-btn { font-size: 1.6rem; color: #5c5c5c; cursor: pointer; padding: 5px; }

    /* Side Menu */
    .side-menu {
      position: fixed; top: 0; right: -280px; width: 280px; height: 100vh;
      background: #ffffff; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
      z-index: 2000; transition: right 0.4s ease;
      display: flex; flex-direction: column; padding: 30px 20px;
    }
    .side-menu.active { right: 0; }
    .close-btn { align-self: flex-end; font-size: 1.8rem; color: #5c5c5c; cursor: pointer; margin-bottom: 30px; }
    .menu-links { list-style: none; }
    .menu-links li { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .menu-links a { text-decoration: none; font-size: 1.2rem; color: #333; font-weight: 500; display: flex; align-items: center; gap: 15px; transition: 0.3s;}
    .menu-links a i { color: #eb6923; width: 20px; text-align: center; }
    .menu-links a:hover { color: #4b7dbd; }
    
    /* Special Login Link in Menu */
    .login-link-menu { color: #eb6923 !important; font-weight: 700 !important; }
    
    .menu-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.5);
      z-index: 1500; opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .menu-overlay.active { opacity: 1; visibility: visible; }

    /* =========================================
       3. MAIN CONTENT
       ========================================= */
    #main-content {
      padding-top: 90px; padding-bottom: 50px;
      display: none; opacity: 0; transition: opacity 1s ease;
    }
    #main-content.show-content { display: block; opacity: 1; }

    .container { width: 90%; max-width: 1200px; margin: 0 auto; }

    /* CTA Section */
    .plan-cta-wrapper {
      background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=800&auto=format&fit=crop') center/cover;
      border-radius: 15px; position: relative; overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 10px;
      border: 3px solid #ffffff; outline: 2px solid #eb6923; 
    }
    .plan-cta-wrapper::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
    }
    .plan-cta-content { position: relative; z-index: 10; padding: 40px 20px; text-align: center; color: white; cursor: pointer; }
    .plan-cta-content h2 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; }
    .click-icon { font-size: 2rem; color: #eb6923; animation: bounce 2s infinite; }

    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

    .plan-options {
      max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out;
      display: flex; flex-direction: column; gap: 15px; margin-top: 15px;
    }
    .plan-options.open { max-height: 300px; }
    .btn-option {
      background: #ffffff; padding: 15px; border-radius: 10px; text-align: center;
      text-decoration: none; font-weight: 600; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.3s;
    }
    .btn-2d { color: #4b7dbd; border-left: 5px solid #4b7dbd; }
    .btn-3d { color: #eb6923; border-left: 5px solid #eb6923; }

    .section-title {
      font-family: 'Montserrat', sans-serif; font-size: 1.5rem; color: #333;
      margin: 40px 0 20px; text-align: center;
    }
    .section-title::after { content: ''; display: block; width: 50px; height: 3px; background: #4b7dbd; margin: 8px auto 0; border-radius: 2px; }

    .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .portfolio-item { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); aspect-ratio: 1 / 1; }
    .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
    .portfolio-item:hover img { transform: scale(1.1); }
    .portfolio-label { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 8px; font-size: 0.8rem; text-align: center; }

  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="intro-container">
      <svg class="intro-house-svg" viewBox="0 0 120 100">
        <path class="intro-layer-orange" d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" />
        <path class="intro-layer-blue" d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" />
      </svg>
      <div class="intro-text">
        <span class="intro-e">e</span><span class="intro-dash">-</span><span class="intro-naksha">Naksha</span>
      </div>
      <div class="intro-slogan">Sketch Your Dream</div>
    </div>
  </div>

  <header id="main-header">
    <a href="index.html" class="header-left">
      <svg class="header-logo-svg" viewBox="0 0 120 100">
        <path d="M 60 30 L 95 65 V 95 H 75 V 70 H 55 V 95 H 40 V 50 Z" fill="#eb6923" />
        <path d="M 15 70 L 60 25 L 85 50 L 70 65 L 60 55 L 35 80 Z" fill="#4b7dbd" />
      </svg>
      <div class="header-text-container">
        <div class="header-logo-text">
          <span style="color: #eb6923;">e</span><span style="color: #5c5c5c; margin: 0 3px;">-</span><span style="color: #4b7dbd;">Naksha</span>
        </div>
        <div class="header-slogan">Sketch Your Dream</div>
      </div>
    </a>
    
    <div class="header-right">
      <a href="login.html" class="login-icon-header" title="Login / Signup">
        <i class="fa-solid fa-circle-user"></i>
      </a>
      <div class="menu-btn" onclick="toggleMenu()">
        <i class="fa-solid fa-bars-staggered"></i>
      </div>
    </div>
  </header>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  
  <div class="side-menu" id="sideMenu">
    <div class="close-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
    <ul class="menu-links">
      <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="#"><i class="fa-solid fa-drafting-compass"></i> Services</a></li>
      <li><a href="#"><i class="fa-solid fa-images"></i> Portfolio</a></li>
      <li><a href="#"><i class="fa-solid fa-phone"></i> Contact Us</a></li>
      <li><a href="login.html" class="login-link-menu"><i class="fa-solid fa-right-to-bracket"></i> Login / Sign Up</a></li>
    </ul>
  </div>

  <main id="main-content">
    <div class="container">
      
      <div class="plan-cta-wrapper">
        <div class="plan-cta-content" onclick="togglePlanOptions()">
          <h2>Start Your<br><span style="color: #eb6923;">House Plan</span></h2>
          <p>Tap here to select your design type</p>
          <i class="fa-regular fa-hand-pointer click-icon"></i>
        </div>
      </div>
      
      <div class="plan-options" id="planOptions">
        <a href="#" class="btn-option btn-2d"><i class="fa-solid fa-ruler-combined"></i> 2D House Plan</a>
        <a href="#" class="btn-option btn-3d"><i class="fa-solid fa-cube"></i> 3D Elevation</a>
      </div>

      <h3 class="section-title">Project Portfolio</h3>
      <div class="portfolio-grid">
        <div class="portfolio-item">
          <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=400&auto=format&fit=crop" alt="Villa">
          <div class="portfolio-label">Modern Villa</div>
        </div>
        <div class="portfolio-item">
          <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=400&auto=format&fit=crop" alt="Interior">
          <div class="portfolio-label">Luxury Interior</div>
        </div>
        <div class="portfolio-item">
          <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=400&auto=format&fit=crop" alt="Duplex">
          <div class="portfolio-label">Duplex Home</div>
        </div>
        <div class="portfolio-item">
          <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=400&auto=format&fit=crop" alt="3D">
          <div class="portfolio-label">3D Elevation</div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Splash Screen to Main Transition
    window.onload = () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        const header = document.getElementById('main-header');
        const mainContent = document.getElementById('main-content');
        
        splash.style.transform = 'translateY(-100vh)';
        splash.style.opacity = '0';
        
        setTimeout(() => {
          splash.style.display = 'none'; 
          header.classList.add('show-header');
          mainContent.classList.add('show-content');
        }, 800); 
      }, 4200); 
    };

    // Toggle Side Menu
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('active');
      document.getElementById('menuOverlay').classList.toggle('active');
    }

    // Toggle 2D/3D Buttons
    function togglePlanOptions() {
      document.getElementById('planOptions').classList.toggle('open');
    }
  </script>
</body>
</html>
