<div class="auth-container">
    <div class="auth-title"><span style="color:#eb6923">Order</span> <span style="color:#4b7dbd">Requirements</span></div>
    
    <div class="input-group">
        <label>Plot Dimensions (Length x Width)</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-ruler-combined"></i>
            <input type="text" id="plotSize" placeholder="e.g. 20 x 45 ft">
        </div>
    </div>

    <div class="input-group">
        <label>Plot Orientation (Facing)</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-compass"></i>
            <select id="facing">
                <option value="North">North</option>
                <option value="East">East</option>
                <option value="South">South</option>
                <option value="West">West</option>
                <option value="North-East">North-East</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>BHK Preference</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-bed"></i>
            <input type="text" id="bhk" placeholder="e.g. 2BHK, 3BHK">
        </div>
    </div>

    <div class="input-group">
        <label>Upload Rough Paper Sketch (Photo)</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-camera"></i>
            <input type="file" id="sketchFile" accept="image/*" style="padding-top: 10px;">
        </div>
    </div>

    <button class="auth-btn" id="btnSubmit2D">SUBMIT ORDER</button>
    <p style="margin-top:15px; text-align:center;"><a href="javascript:void(0)" onclick="switchTab(null, 'service')" style="color:#5c5c5c;">Go Back</a></p>
</div>

<script type="module">
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const storage = getStorage();
    const db = getFirestore();
    const auth = getAuth();

    document.getElementById('btnSubmit2D').onclick = async () => {
        const file = document.getElementById('sketchFile').files[0];
        const plot = document.getElementById('plotSize').value;
        if(!file || !plot) return alert("All fields are mandatory!");

        const btn = document.getElementById('btnSubmit2D');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const sRef = ref(storage, `orders/2d_${auth.currentUser.uid}_${Date.now()}`);
            const snap = await uploadBytes(sRef, file);
            const url = await getDownloadURL(snap.ref);

            await addDoc(collection(db, "orders"), {
                customerName: auth.currentUser.displayName,
                customerEmail: auth.currentUser.email,
                serviceType: "2D Layout Plan",
                plotSize: plot,
                facing: document.getElementById('facing').value,
                bhk: document.getElementById('bhk').value,
                sketchUrl: url,
                status: "Received",
                date: new Date().toLocaleString()
            });

            alert("Order Placed Successfully!");
            window.switchTab(null, 'home');
        } catch(e) { 
            alert("Error: " + e.message); 
            btn.disabled = false; 
            btn.innerText = "SUBMIT ORDER"; 
        }
    };
</script>
